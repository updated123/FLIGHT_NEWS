services:
  - type: web
    name: flight-news-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: qwen/qwen3-32b
      - key: GROQ_REQUEST_DELAY_SECONDS
        value: "7"
      - key: NEWS_BATCH_SIZE
        value: "3"
